# Edge no nginx do HOST (não usar gateway Docker — outros sites compartilham 80/443).
# Upstream: containers em 127.0.0.1:7101 / 7110 / 7111 / 7112

# --- interno (token-key) ---
server {
    listen 80;
    server_name interno.moneypromotora.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name interno.moneypromotora.com.br;

    ssl_certificate     /etc/letsencrypt/live/interno.moneypromotora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/interno.moneypromotora.com.br/privkey.pem;

    client_max_body_size 500M;

    location /api/ {
        proxy_pass http://127.0.0.1:7101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;
        client_max_body_size 500M;
    }

    location / {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- plataforma ---
server {
    listen 80;
