# Bootstrap HTTP (antes do certbot) — sem bloco SSL
# Copiar para sites-available e emitir certs; depois usar universidade-sites.conf

server {
    listen 80;
    server_name interno.moneypromotora.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:7101;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name plataforma.moneypromotora.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:7101;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:7101;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/universidade/static/;
    }

    location /media/ {
        alias /var/www/universidade/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:7111;
        proxy_set_header Host $host;
    }
}

