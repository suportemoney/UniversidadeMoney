name: Deploy VPS Homologação

on:
  push:
    branches: [homolog]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy homologação via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/universidade/repo
            git fetch origin homolog
            git checkout homolog
            git reset --hard origin/homolog
            sed -i 's/\r$//' deploy/scripts/deploy-docker.sh 2>/dev/null || true
            bash deploy/scripts/deploy-docker.sh hml

# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY (mesmos da produção)
# Branch homolog + arquivo .env.homolog na VPS
