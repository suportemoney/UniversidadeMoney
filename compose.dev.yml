# Desenvolvimento local (Windows): 3 Vite + backend + db
# Uso:
#   docker compose -f compose.yml -f compose.dev.yml --env-file .env.development up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-universidade_money_dev}
      POSTGRES_USER: ${DB_USER:-universidade_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "${DB_PUBLISH_PORT:-5433}:5432"
    networks:
      - universidade
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-universidade_user} -d ${DB_NAME:-universidade_money_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env.development
    environment:
      APP_ENV: development
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      DB_PORT: "5432"
      STATIC_ROOT: /data/static
      MEDIA_ROOT: /data/media
    volumes:
      - ./backend:/app
      - static_prod:/data/static
      - media_prod:/data/media
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - universidade
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  frontend-plataforma:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
      args:
        FRONTEND_DIR: frontend-plataforma
    environment:
      VITE_API_URL: /api
      VITE_SURFACE: plataforma
      VITE_PROXY_TARGET: http://backend:8000
      VITE_INTERNO_URL: http://localhost:5175
      VITE_PAINEL_URL: http://localhost:5174
    volumes:
      - ./frontend-plataforma:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - universidade
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

  frontend-painel:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
      args:
        FRONTEND_DIR: frontend-painel
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
      VITE_PLATAFORMA_URL: http://localhost:5173
    volumes:
      - ./frontend-painel:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - backend
    networks:
      - universidade
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5174"]

  frontend-interno:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
      args:
        FRONTEND_DIR: frontend-plataforma
    environment:
      VITE_API_URL: /api
      VITE_SURFACE: interno
      VITE_PROXY_TARGET: http://backend:8000
      VITE_PLATAFORMA_URL: http://localhost:5173/login
    volumes:
      - ./frontend-plataforma:/app
      - /app/node_modules
    ports:
      - "5175:5175"
    depends_on:
      - backend
    networks:
      - universidade
    command: ["npm", "run", "dev:interno", "--", "--host", "0.0.0.0", "--port", "5175"]
