# VPS: produção + homologação (3 frontends cada) + gateway + certbot

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-${DB_USER:-universidade_user}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:?definir POSTGRES_PASSWORD ou DB_PASSWORD}}
      POSTGRES_DB: ${POSTGRES_DB:-${DB_NAME:-universidade_money}}
      POSTGRES_MULTIPLE_DATABASES: universidade_money_hml
    volumes:
      - pgdata_vps:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    networks:
      - universidade
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-universidade_user} -d ${POSTGRES_DB:-universidade_money}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend-prod:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME_PROD:-universidade_money}
      STATIC_ROOT: /data/static
      MEDIA_ROOT: /data/media
    volumes:
      - static_prod:/data/static
      - media_prod:/data/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - universidade
    restart: unless-stopped

  backend-hml:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env.homolog
    environment:
      APP_ENV: homologation
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME_HML:-universidade_money_hml}
      STATIC_ROOT: /data/static
      MEDIA_ROOT: /data/media
    volumes:
      - static_hml:/data/static
      - media_hml:/data/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - universidade
    restart: unless-stopped

  frontend-interno-prod:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        FRONTEND_DIR: frontend-plataforma
        BUILD_COMMAND: npm run build:interno
        VITE_SURFACE: interno
        VITE_API_URL: https://${DOMAIN_INTERNO:-interno.moneypromotora.com.br}/api
        VITE_PLATAFORMA_URL: https://${DOMAIN_PLATAFORMA:-plataforma.moneypromotora.com.br}/login
    networks:
      - universidade
    restart: unless-stopped

  frontend-plataforma-prod:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        FRONTEND_DIR: frontend-plataforma
        BUILD_COMMAND: npm run build
        VITE_SURFACE: plataforma
        VITE_API_URL: https://${DOMAIN_PLATAFORMA:-plataforma.moneypromotora.com.br}/api
        VITE_INTERNO_URL: https://${DOMAIN_INTERNO:-interno.moneypromotora.com.br}
        VITE_PAINEL_URL: https://${DOMAIN_PAINEL:-painel-interno.moneypromotora.com.br}
    networks:
      - universidade
    restart: unless-stopped

  frontend-painel-prod:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        FRONTEND_DIR: frontend-painel
        BUILD_COMMAND: npm run build
        VITE_API_URL: https://${DOMAIN_PAINEL:-painel-interno.moneypromotora.com.br}/api
        VITE_PLATAFORMA_URL: https://${DOMAIN_PLATAFORMA:-plataforma.moneypromotora.com.br}
    networks:
      - universidade
    restart: unless-stopped

  frontend-interno-hml:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        FRONTEND_DIR: frontend-plataforma
        BUILD_COMMAND: npm run build:interno
        VITE_SURFACE: interno
        VITE_API_URL: https://${DOMAIN_INTERNO_HML:-interno-hml.moneypromotora.com.br}/api
        VITE_PLATAFORMA_URL: https://${DOMAIN_PLATAFORMA_HML:-plataforma-hml.moneypromotora.com.br}/login
    networks:
      - universidade
    restart: unless-stopped

  frontend-plataforma-hml:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        FRONTEND_DIR: frontend-plataforma
        BUILD_COMMAND: npm run build
        VITE_SURFACE: plataforma
        VITE_API_URL: https://${DOMAIN_PLATAFORMA_HML:-plataforma-hml.moneypromotora.com.br}/api
        VITE_INTERNO_URL: https://${DOMAIN_INTERNO_HML:-interno-hml.moneypromotora.com.br}
        VITE_PAINEL_URL: https://${DOMAIN_PAINEL_HML:-painel-interno-hml.moneypromotora.com.br}
    networks:
      - universidade
    restart: unless-stopped

  frontend-painel-hml:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        FRONTEND_DIR: frontend-painel
        BUILD_COMMAND: npm run build
        VITE_API_URL: https://${DOMAIN_PAINEL_HML:-painel-interno-hml.moneypromotora.com.br}/api
        VITE_PLATAFORMA_URL: https://${DOMAIN_PLATAFORMA_HML:-plataforma-hml.moneypromotora.com.br}
    networks:
      - universidade
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.gateway
    environment:
      DOMAIN_INTERNO: ${DOMAIN_INTERNO:-interno.moneypromotora.com.br}
      DOMAIN_PLATAFORMA: ${DOMAIN_PLATAFORMA:-plataforma.moneypromotora.com.br}
      DOMAIN_PAINEL: ${DOMAIN_PAINEL:-painel-interno.moneypromotora.com.br}
      DOMAIN_INTERNO_HML: ${DOMAIN_INTERNO_HML:-interno-hml.moneypromotora.com.br}
      DOMAIN_PLATAFORMA_HML: ${DOMAIN_PLATAFORMA_HML:-plataforma-hml.moneypromotora.com.br}
      DOMAIN_PAINEL_HML: ${DOMAIN_PAINEL_HML:-painel-interno-hml.moneypromotora.com.br}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_prod:/data/prod/static:ro
      - media_prod:/data/prod/media:ro
      - static_hml:/data/hml/static:ro
      - media_hml:/data/hml/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend-prod
      - frontend-interno-prod
      - frontend-plataforma-prod
      - frontend-painel-prod
    networks:
      - universidade
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 12h
        done
    networks:
      - universidade
    restart: unless-stopped

  certbot-init:
    image: certbot/certbot:latest
    profiles: ["init"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
      - ./docker/certbot/init-certs.sh:/init-certs.sh:ro
    environment:
      DOMAIN_INTERNO: ${DOMAIN_INTERNO:-interno.moneypromotora.com.br}
      DOMAIN_PLATAFORMA: ${DOMAIN_PLATAFORMA:-plataforma.moneypromotora.com.br}
      DOMAIN_PAINEL: ${DOMAIN_PAINEL:-painel-interno.moneypromotora.com.br}
      DOMAIN_INTERNO_HML: ${DOMAIN_INTERNO_HML:-interno-hml.moneypromotora.com.br}
      DOMAIN_PLATAFORMA_HML: ${DOMAIN_PLATAFORMA_HML:-plataforma-hml.moneypromotora.com.br}
      DOMAIN_PAINEL_HML: ${DOMAIN_PAINEL_HML:-painel-interno-hml.moneypromotora.com.br}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@moneypromotora.com.br}
    entrypoint: /bin/sh
    command: ["-c", "sed -i 's/\\r$//' /init-certs.sh && chmod +x /init-certs.sh && /init-certs.sh"]
    networks:
      - universidade
    depends_on:
      - gateway
